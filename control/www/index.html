<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STM-USB Control Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>STM-USB Control Panel</h1>

    <div class="section">
        <button id="connectBtn" onclick="toggleConnection()">Connect</button>
        <button id="flashBtn" onclick="flashFirmware()" disabled>Flash</button>

        <div id="progressContainer" class="progress-container">
            <div id="progressBar" class="progress-bar">
                <span id="progressText" class="progress-text">0%</span>
            </div>
        </div>

        <div class="send-group">
            <div class="input-group">
                <input type="text" id="textInput" placeholder="Type a message and press Enter or Send"
                       onkeypress="handleKeyPress(event)" disabled>
                <button id="sendBtn" onclick="sendText()" disabled>Send</button>
            </div>
        </div>

        <textarea id="output" readonly></textarea>
    </div>

    <div class="section">
        <h2>First Flash</h2>
        <p class="instructions">For initial programming, manually put the device in DFU mode:</p>
        <ol class="instructions">
            <li>Hold the BOOT0 button</li>
            <li>Press and release RESET</li>
            <li>Release BOOT0</li>
        </ol>
        <button id="directFlashBtn" onclick="directFlash()">Direct Flash</button>
    </div>

    <script type="module">
        import init, {
            get_bootloader_device,
            request_bootloader_device,
            flash_to_device,
            connect_device,
            send_text,
            disconnect_device,
            detach_to_dfu
        } from './pkg/control.js';

        let device = null;
        let firmwareData = null;

        // Pre-load firmware on page load
        async function loadFirmware() {
            try {
                const response = await fetch('firmware.bin');
                if (response.ok) {
                    firmwareData = new Uint8Array(await response.arrayBuffer());
                    log(`Firmware loaded: ${firmwareData.length} bytes`);
                }
            } catch (e) {
                log('Note: firmware.bin not found, will load on flash');
            }
        }

        window.directFlash = async function() {
            const btn = document.getElementById('directFlashBtn');
            btn.disabled = true;

            try {
                // Load firmware if not already loaded
                if (!firmwareData) {
                    btn.textContent = 'Loading firmware...';
                    const response = await fetch('firmware.bin');
                    if (!response.ok) {
                        throw new Error('Failed to load firmware.bin');
                    }
                    firmwareData = new Uint8Array(await response.arrayBuffer());
                    log(`Loaded firmware: ${firmwareData.length} bytes`);
                }

                // Prompt user to select DFU device
                btn.textContent = 'Select device...';
                const bootloader = await request_bootloader_device();

                // Flash
                btn.textContent = 'Flashing...';
                await flash_to_device(bootloader, firmwareData);

            } catch (e) {
                if (!e.toString().includes('cancelled')) {
                    console.error('Direct flash error:', e);
                    log('Error: ' + e);
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Direct Flash';
            }
        };

        window.flashFirmware = async function() {
            const btn = document.getElementById('flashBtn');
            btn.disabled = true;

            try {
                // Load firmware if not already loaded
                if (!firmwareData) {
                    btn.textContent = 'Loading firmware...';
                    const response = await fetch('firmware.bin');
                    if (!response.ok) {
                        throw new Error('Failed to load firmware.bin');
                    }
                    firmwareData = new Uint8Array(await response.arrayBuffer());
                    log(`Loaded firmware: ${firmwareData.length} bytes`);
                }

                // Detach to DFU mode
                btn.textContent = 'Resetting to DFU...';
                await detach_to_dfu(device);
                device = null;
                updateConnectionStatus(false);

                // Wait for bootloader to appear
                btn.textContent = 'Waiting for bootloader...';
                const bootloader = await waitForBootloader(5000);

                // Flash
                btn.textContent = 'Flashing...';
                await flash_to_device(bootloader, firmwareData);

            } catch (e) {
                console.error('Flash error:', e);
                log('Error: ' + e);
            } finally {
                btn.disabled = true; // Stay disabled until reconnected
                btn.textContent = 'Flash';
            }
        };

        async function waitForBootloader(timeoutMs) {
            log('Waiting for bootloader to appear...');
            const deadline = Date.now() + timeoutMs;
            while (Date.now() < deadline) {
                try {
                    const bl = await get_bootloader_device();
                    log('Bootloader found!');
                    return bl;
                } catch (e) {
                    // Not found yet, keep waiting
                }
                await new Promise(r => setTimeout(r, 200));
            }
            throw new Error('Bootloader did not appear. Have you paired it? (See First-Time Setup)');
        }

        window.toggleConnection = async function() {
            if (device) {
                try {
                    await disconnect_device(device);
                } catch (e) {
                    console.error('Disconnect error:', e);
                }
                device = null;
                updateConnectionStatus(false);
            } else {
                try {
                    device = await connect_device();
                    updateConnectionStatus(true);
                } catch (e) {
                    if (!e.toString().includes('cancelled')) {
                        console.error('Connect error:', e);
                        log('Error: ' + e);
                    }
                }
            }
        };

        window.sendText = async function() {
            const input = document.getElementById('textInput');
            const text = input.value.trim();
            if (!text || !device) return;

            try {
                await send_text(device, text);
                input.value = '';
            } catch (e) {
                console.error('Send error:', e);
                log('Error: ' + e);
                if (e.toString().includes('device')) {
                    await disconnectDevice();
                }
            }
        };

        window.handleKeyPress = function(event) {
            if (event.key === 'Enter') {
                sendText();
            }
        };

        function updateConnectionStatus(connected) {
            const connectBtn = document.getElementById('connectBtn');
            const flashBtn = document.getElementById('flashBtn');
            const textInput = document.getElementById('textInput');
            const sendBtn = document.getElementById('sendBtn');

            if (connected) {
                connectBtn.textContent = 'Disconnect';
                flashBtn.disabled = false;
                textInput.disabled = false;
                sendBtn.disabled = false;
                textInput.focus();
            } else {
                connectBtn.textContent = 'Connect';
                flashBtn.disabled = true;
                textInput.disabled = true;
                sendBtn.disabled = true;
            }
        }

        function log(msg) {
            const output = document.getElementById('output');
            output.value += msg + '\n';
            output.scrollTop = output.scrollHeight;
        }

        // Initialize WASM
        init().then(() => {
            log('WebAssembly module loaded');
            loadFirmware();
            log('Ready - click Connect to begin');
        }).catch(e => {
            log('Error loading WASM: ' + e);
        });
    </script>
</body>
</html>
